version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3080:80"
    expose:
      - "80"
    environment:
      - VITE_WA_SERVICE_URL=http://whatsapp-service:3001
    depends_on:
      - whatsapp-service

  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./whatsapp-service/wa_session_v2:/app/wa_session_v2
    environment:
      - PORT=3001
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    expose:
      - "3001"
