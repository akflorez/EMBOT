version: '3.8'

services:
  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: whatsapp-service
    restart: always
    environment:
      - PORT=3001
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - ./whatsapp-service/wa_session_v2:/app/wa_session_v2
    expose:
      - "3001"
    networks:
      - embot-network
      - coolify

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embot-frontend
    restart: always
    expose:
      - "80"
    environment:
      - VITE_WA_SERVICE_URL=http://whatsapp-service:3001
    depends_on:
      - whatsapp-service
    networks:
      - embot-network
      - coolify

networks:
  embot-network:
    driver: bridge
  coolify:
    external: true
