server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
        # Cache control
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # WebSocket proxy for Socket.io
    location /wa/socket.io {
        resolver 127.0.0.11 valid=30s;
        set $backend_service whatsapp-service;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        proxy_pass http://$backend_service:3001/socket.io;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy to WhatsApp Service (API)
    location /wa/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_service whatsapp-service;
        proxy_pass http://$backend_service:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API proxy for common routes
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_service whatsapp-service;
        proxy_pass http://$backend_service:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to External CRM (Optional if you want to route it through Nginx)
    #
    # location /api/ {
    #     proxy_pass http://your-crm-url;
    # }
    #
}
