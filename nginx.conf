server {
    listen 80;
    
    # Internal Docker DNS resolver (standard for Docker/Coolify)
    resolver 127.0.0.11 valid=30s;

    # Frontend Assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # WebSocket proxy for Socket.io (Critical for Live Updates)
    location /wa/socket.io {
        set $backend_host whatsapp-service;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Using a variable ($backend_host) avoids Nginx crash on startup if host is not yet online
        proxy_pass http://$backend_host:3001/socket.io;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Proxy to WhatsApp Service API
    location /wa/ {
        set $backend_host whatsapp-service;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Strip /wa/ prefix before sending to backend
        proxy_pass http://$backend_host:3001/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Fallback API proxy
    location /api/ {
        set $backend_host whatsapp-service;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_pass http://$backend_host:3001/;
        proxy_read_timeout 300;
    }
}
